<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotional Message</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        overflow: hidden;

        /* Deep sad gradient */
        background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    }

    /* Rain animation */
    body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background: url('https://i.imgur.com/7b1hF0T.png');
        opacity: 0.25;
        animation: rain 0.4s linear infinite;
        z-index: -1;
    }

    @keyframes rain {
        from { background-position: 0 0; }
        to { background-position: 0 100%; }
    }

    .container {
        background: rgba(0, 0, 0, 0.6);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        width: 350px;
        box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    input {
        padding: 10px;
        width: 80%;
        border-radius: 8px;
        border: none;
        margin-top: 10px;
    }

    button {
        margin-top: 15px;
        padding: 10px;
        width: 85%;
        border: none;
        border-radius: 8px;
        background: #34495e;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #2c3e50;
    }

    /* Big emotional text */
    #output {
        margin-top: 25px;
        font-size: 22px;
        font-weight: bold;
        line-height: 1.6;
        white-space: pre-line;

        /* Heart-like glowing effect */
        color: #ff6b81;
        text-shadow: 
            0 0 5px #ff6b81,
            0 0 10px #ff6b81,
            0 0 20px #ff4d6d;
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        color: #ff6b81;
        animation: floatUp 5s linear infinite;
        font-size: 20px;
        opacity: 0.7;
    }

    @keyframes floatUp {
        0% { transform: translateY(100vh); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(-10vh); opacity: 0; }
    }
</style>

</head>

<body>

<div class="container">
    <h2>Enter Value of n</h2>

```
<input type="number" id="nValue" placeholder="Enter n">
<br>

<button onclick="displayMessage()">Submit</button>

<div id="output"></div>
```

</div>

<script>
function displayMessage() {
    const n = parseInt(document.getElementById('nValue').value);
    const output = document.getElementById('output');

    // YOUR ORIGINAL LOGIC
    switch(n) {
        case 1:
            output.textContent = "💔 any problem there\nno any message get from you till even now\npls text me show this message to your sis\ntell her to message me 💔";
            break;

        case 2:
            output.textContent = "💔 no any message get from you till even now 💔";
            break;

        default:
            output.textContent = "Enter 1 or 2";
    }
}

/* Create floating hearts */
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💔";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 500);
</script>

</body>
</html>
